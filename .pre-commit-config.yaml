# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  # - repo: https://github.com/rhysd/actionlint
  #   rev: v1.7.3
  #   hooks:
  #     - id: actionlint
  - repo: https://github.com/pycqa/isort
    # rev must match what's in dev-requirements.txt
    rev: 5.13.2
    hooks:
      - id: isort
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        additional_dependencies: ["bandit[toml]"]
        args: [
          "-c", "pyproject.toml",
        ]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # rev should match the ruff pin in requirements-dev.txt
    rev: v0.15.20
    hooks:
      - id: ruff
  - repo: local
    hooks:
      - id: config-reference-up-to-date
        name: config reference is generated from configuration.toml
        entry: python scripts/generate_config_reference.py --check
        language: python
        files: ^(pr_agent/settings/configuration\.toml|docs/docs/usage-guide/configuration_reference\.md|scripts/generate_config_reference\.py)$
        pass_filenames: false
